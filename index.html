<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEY</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background: url("https://i.imgur.com/eEfEylp.jpeg") no-repeat center center fixed;
background-size: cover;
color:white;
font-family:sans-serif;
text-align:center;
overflow:hidden;
}
body::before{ display:none; }
body::after{ display:none; }

.top{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
}
.top-logo{
width:220px;
filter:drop-shadow(0 0 14px rgba(168,85,247,0.8));
}
.sylax-logo{
width:130px;
display:block;
margin:0 auto 10px auto;
filter:drop-shadow(0 0 16px rgba(168,85,247,0.9));
}
.divider{
position:fixed;
top:138px;
left:0;
width:100%;
height:2px;
background:linear-gradient(90deg, transparent 0%, #a855f7 25%, #ffffff 50%, #a855f7 75%, transparent 100%);
box-shadow:0 0 12px #a855f7, 0 0 25px rgba(168,85,247,0.5);
z-index:5;
}
.container{
position:absolute;
top:58%;
left:50%;
transform:translate(-50%,-50%);
}
.key-box{
margin-bottom:55px;
width:370px;
height:120px;
background:url("https://i.imgur.com/535TLvZ.png") no-repeat center center;
background-size:100% 100%;
display:flex;
align-items:center;
justify-content:center;
border:none;
box-shadow:none;
border-radius:0;
padding:0;
}
#keyText{
font-size:13px;
word-break:break-all;
max-width:290px;
text-align:center;
padding:0 10px;
background: linear-gradient(90deg, #ff4dff, #a855f7, #7a00ff, #ff00cc, #a855f7);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:keyGlow 3s linear infinite;
}
@keyframes keyGlow{
0%{background-position:0%;}
100%{background-position:300%;}
}
button{
padding:18px 60px;
border:none;
border-radius:14px;
background:transparent;
color:white;
cursor:pointer;
font-size:18px;
font-family:'Orbitron', sans-serif;
font-weight:700;
letter-spacing:2px;
box-shadow:none;
transition:0.3s;
animation:none;
}
button:hover{ transform:scale(1.07); }
button.copied{
background:transparent;
box-shadow:none;
animation:none;
}
canvas{
position:fixed;
top:0;
left:0;
z-index:-3;
}
.btn-wrapper{
position:relative;
display:inline-block;
}
.btn-wrapper::before{
content:"";
position:absolute;
top:-28px;
left:-36px;
right:-36px;
bottom:-28px;
background:url("https://i.imgur.com/3Us3Unr.png") no-repeat center center;
background-size:100% 100%;
pointer-events:none;
z-index:10;
}
</style>
</head>

<body>

<div class="top"><img src="https://i.imgur.com/ZTY146r.png" class="top-logo" alt="KEY"></div>
<div class="divider"></div>
<canvas id="bg"></canvas>

<div class="container">
  <img src="https://i.imgur.com/0ayApUw.png" class="sylax-logo" alt="Sylax">
  <div class="key-box">
    <div id="keyText">Clique no botao</div>
  </div>
  <div class="btn-wrapper">
    <button id="btn" onclick="generateKey()">COPY KEY</button>
  </div>
</div>

<script>
let keyLocked = false;

async function generateKey(){
  let now = Date.now();
  let lastTime = localStorage.getItem("lastKeyTime");

  if(lastTime && (now - lastTime) < 2 * 60 * 60 * 1000){
    document.getElementById("keyText").innerText = "AGUARDE 2H";
    return;
  }

  if(keyLocked){
    document.getElementById("keyText").innerText = "KEY BLOQUEADA";
    return;
  }

  try{
    let res = await fetch("https://sylax-key.onrender.com/getkey");
    let data = await res.json();

    if(data.error === "rate_limited"){
      document.getElementById("keyText").innerText = "AGUARDE 2H";
      localStorage.setItem("lastKeyTime", now);
      return;
    }

    if(data.error){
      document.getElementById("keyText").innerText = "ERRO SERVIDOR";
      return;
    }

    document.getElementById("keyText").innerText = data.key;
    navigator.clipboard.writeText(data.key).catch(()=>{});
    localStorage.setItem("lastKeyTime", now);
    keyLocked = true;

    let btn = document.getElementById("btn");
    btn.innerText = "SUCCESS!";
    btn.classList.add("copied");
    btn.disabled = true;

  }catch{
    document.getElementById("keyText").innerText = "ERRO SERVIDOR";
  }
}

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];
for(let i=0;i<180;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*3+1,
    dx:(Math.random()-0.5)*1.4,
    dy:(Math.random()-0.5)*1.4,
    o:Math.random()*0.5+0.5
  });
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx; p.y+=p.dy;
    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(168,85,247,${p.o})`;
    ctx.shadowColor="#a855f7";
    ctx.shadowBlur=8;
    ctx.fill();
    ctx.shadowBlur=0;
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
